<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TÜRKİYE CUMHURİYETİ BKNET SINAV HİZMETLERİ</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Büyük 7-segment tarz */
#clock {
    font-family: monospace;
    font-weight: bold;
    font-size: 28vw;   /* ÇOK BÜYÜK */
    color: red;
    text-shadow:
        0 0 20px red,
        0 0 40px red,
        0 0 60px red;
    letter-spacing: 3vw;
}

video {
    display: none;
}

#stopBtn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: black;
    color: red;
    border: 2px solid red;
    padding: 14px 24px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="clock">88:88</div>
<video id="video" autoplay playsinline></video>
<button id="stopBtn">Ses Aç / Kapat</button>

<script>
const clock = document.getElementById("clock");
const video = document.getElementById("video");
const stopBtn = document.getElementById("stopBtn");

function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    clock.textContent = h + ":" + m;
}
setInterval(updateClock, 1000);
updateClock();

let mediaRecorder;
let chunks = [];

async function init() {

    // Tam ekran
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
    }

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: true
    });

    video.srcObject = stream;

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.start(); // İzin verince otomatik başlar
}

init();

stopBtn.onclick = function() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();

        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: "video/webm" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");

            const now = new Date();
            const fileName = now.toISOString().replace(/[:.]/g,"-");

            a.href = url;
            a.download = fileName + ".webm";
            a.click();
        };
    }
};
</script>

</body>
</html>
