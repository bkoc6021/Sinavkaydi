<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Cumhuriyeti Burak KOÇ Sınav hizmetleri sınav kayıtı</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.clock{
    display:flex;
    align-items:center;
    justify-content:center;
}

.digit{
    position:relative;
    width:18vw;
    height:32vw;
    margin:1vw;
}

.segment{
    position:absolute;
    background:red;
    box-shadow:0 0 25px red;
    opacity:0.1;
}

.a{ top:0; left:10%; width:80%; height:8%; }
.b{ top:5%; right:0; width:8%; height:40%; }
.c{ bottom:5%; right:0; width:8%; height:40%; }
.d{ bottom:0; left:10%; width:80%; height:8%; }
.e{ bottom:5%; left:0; width:8%; height:40%; }
.f{ top:5%; left:0; width:8%; height:40%; }
.g{ top:46%; left:10%; width:80%; height:8%; }

.colon{
    width:5vw;
    height:32vw;
    position:relative;
}

.dot{
    width:4vw;
    height:4vw;
    background:red;
    border-radius:50%;
    position:absolute;
    left:0;
    right:0;
    margin:auto;
    box-shadow:0 0 20px red;
}

.dot.top{ top:30%; }
.dot.bottom{ bottom:30%; }
</style>
</head>

<body>

<div class="clock" id="clock"></div>

<script>
const numbers = {
0:['a','b','c','d','e','f'],
1:['b','c'],
2:['a','b','g','e','d'],
3:['a','b','g','c','d'],
4:['f','g','b','c'],
5:['a','f','g','c','d'],
6:['a','f','g','e','c','d'],
7:['a','b','c'],
8:['a','b','c','d','e','f','g'],
9:['a','b','c','d','f','g']
};

function createDigit(){
    const d=document.createElement("div");
    d.className="digit";
    ['a','b','c','d','e','f','g'].forEach(s=>{
        const seg=document.createElement("div");
        seg.className="segment "+s;
        d.appendChild(seg);
    });
    return d;
}

function createColon(){
    const c=document.createElement("div");
    c.className="colon";
    const t=document.createElement("div");
    t.className="dot top";
    const b=document.createElement("div");
    b.className="dot bottom";
    c.appendChild(t);
    c.appendChild(b);
    return c;
}

const clock=document.getElementById("clock");

const d1=createDigit();
const d2=createDigit();
const colon=createColon();
const d3=createDigit();
const d4=createDigit();

clock.append(d1,d2,colon,d3,d4);

function setDigit(digit,num){
    const segs=digit.querySelectorAll(".segment");
    segs.forEach(s=>s.style.opacity=0.1);
    numbers[num].forEach(n=>{
        digit.querySelector("."+n).style.opacity=1;
    });
}

function updateClock(){
    const now=new Date();
    let h=now.getHours().toString().padStart(2,'0');
    let m=now.getMinutes().toString().padStart(2,'0');

    setDigit(d1, h[0]);
    setDigit(d2, h[1]);
    setDigit(d3, m[0]);
    setDigit(d4, m[1]);
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
