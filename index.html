<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bknet Bilişim Sınav Güvenlik Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Digital-7';
            src: url('digital-7.ttf') format('ttf');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #000;
        }

        /* Saat Gösterimi - 7 Segment Font */
        .clock {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            font-family: 'Digital-7', monospace;
            color: #ff0000;
            font-weight: 900;
            letter-spacing: 30px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.9),
                         0 0 60px rgba(255, 0, 0, 0.6),
                         inset 0 0 20px rgba(255, 0, 0, 0.3);
            z-index: 10;
            user-select: none;
        }

        /* Kontrol Noktası */
        .control-dot {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 30px;
            height: 30px;
            background-color: #ff8800;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 10px rgba(255, 136, 0, 0.8);
            transition: all 0.3s ease;
            border: 2px solid #ffaa00;
        }

        .control-dot:hover {
            width: 35px;
            height: 35px;
            box-shadow: 0 0 20px rgba(255, 136, 0, 1);
        }

        /* Yanıp sönen animasyon */
        .recording {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
                background-color: #ff0000;
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            }
            50%, 100% {
                opacity: 0.3;
                background-color: #ff3300;
                box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            }
        }

        /* Kamera Video Elementi (Gizli) */
        #cameraVideo {
            display: none;
        }

        /* Durum Mesajı */
        .status-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: rgba(255, 136, 0, 0.9);
            color: #000;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.3s ease;
            border: 2px solid #ffaa00;
        }

        .status-message.show {
            opacity: 1;
        }

        /* Kayıt Süresi Gösterimi */
        .recording-time {
            position: fixed;
            top: 30px;
            left: 30px;
            font-size: 18px;
            color: #ff8800;
            font-weight: bold;
            z-index: 100;
            display: none;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px solid #ff8800;
        }

        .recording-time.show {
            display: block;
        }

        /* Fallback Font */
        .fallback-clock {
            font-family: 'Courier New', monospace;
            letter-spacing: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Saat Gösterimi -->
        <div class="clock" id="clock">88:88</div>

        <!-- Kontrol Noktası -->
        <div class="control-dot" id="controlDot"></div>

        <!-- Kayıt Süresi -->
        <div class="recording-time" id="recordingTime"></div>

        <!-- Durum Mesajı -->
        <div class="status-message" id="statusMessage"></div>

        <!-- Kamera Video Elementi (Gizli) -->
        <video id="cameraVideo" autoplay></video>
    </div>

    <script>
        // Değişkenler
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordingStartTime = null;
        let recordingTimerInterval = null;

        const clock = document.getElementById('clock');
        const controlDot = document.getElementById('controlDot');
        const statusMessage = document.getElementById('statusMessage');
        const recordingTime = document.getElementById('recordingTime');
        const cameraVideo = document.getElementById('cameraVideo');

        // Saati Güncelle
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            clock.textContent = `${hours}:${minutes}`;
        }

        // Her saniye saati güncelle
        setInterval(updateClock, 1000);
        updateClock();

        // Durum Mesajı Göster
        function showStatus(message, duration = 3000) {
            statusMessage.textContent = message;
            statusMessage.classList.add('show');
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, duration);
        }

        // Kayıt Süresini Güncelle
        function updateRecordingTime() {
            if (!recordingStartTime) return;
            
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const seconds = String(elapsed % 60).padStart(2, '0');
            recordingTime.textContent = `Kayıt: ${minutes}:${seconds}`;
        }

        // Kamera Erişimini Başlat
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: true
                });

                cameraVideo.srcObject = stream;
                return stream;
            } catch (error) {
                console.error('Aygıt Kamera erişimi başarısız:', error);
                showStatus('Aygıt Kamera erişimi reddedildi!');
                return null;
            }
        }

        // Kayıt Başlat
        async function startRecording() {
            try {
                const stream = await startCamera();
                if (!stream) return;

                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus'
                });

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    console.log('Kayıt durduruldu');
                };

                mediaRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();

                // Kontrol noktasını yanıp sönen duruma getir
                controlDot.classList.add('recording');
                recordingTime.classList.add('show');

                // Kayıt süresini güncelle
                recordingTimerInterval = setInterval(updateRecordingTime, 1000);

                showStatus('Dikkat! Kayıt başladı!');
                console.log('Sınav Kayıtı başladı');

            } catch (error) {
                console.error('Sınav Kayıtı başlatma hatası:', error);
                showStatus('Sınav Kayıtı başlatılamadı!');
            }
        }

        // Kayıt Durdur ve İndir
        async function stopRecordingAndDownload() {
            try {
                if (!mediaRecorder || !isRecording) return;

                mediaRecorder.stop();
                isRecording = false;

                // Kontrol noktasını normal duruma getir
                controlDot.classList.remove('recording');
                recordingTime.classList.remove('show');

                // Süre güncellemesini durdur
                clearInterval(recordingTimerInterval);

                // Kayıt durduktan sonra dosyayı indir
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    
                    // Tarih ve saat ile dosya adı oluştur
                    const now = new Date();
                    const timestamp = now.toISOString().replace(/[:.]/g, '-').slice(0, -5);
                    link.href = url;
                    link.download = `sinav-kayit-${timestamp}.webm`;
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    showStatus('✅ Kayıt indirildi!');
                    console.log('Dosya indirildi:', link.download);

                    // Kamera akışını durdur
                    cameraVideo.srcObject.getTracks().forEach(track => track.stop());
                };

            } catch (error) {
                console.error('Sınav Kayıtı durdurma hatası:', error);
                showStatus('Sınav Kayıtı durdurulamad��!');
            }
        }

        // Kontrol Noktası Tıklama Olayı
        controlDot.addEventListener('click', async () => {
            if (!isRecording) {
                // Kayıt başlat
                await startRecording();
            } else {
                // Kayıt durdur ve indir
                await stopRecordingAndDownload();
            }
        });

        // Sayfa yüklendiğinde kamera izni iste
        window.addEventListener('load', async () => {
            showStatus('Aygıt Kamera izni isteniyor...');
            await startCamera();
        });

        // Sayfa kapatılırken kamera akışını temizle
        window.addEventListener('beforeunload', () => {
            if (cameraVideo.srcObject) {
                cameraVideo.srcObject.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
