<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BKNET Dijital Saatli Sınav Güvenliği</title>
    <style>
        @font-face {
            font-family: 'DSDigital';
            src: url('DS-DIGIT.TFF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            background: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
        }
        .clock {
            font-family: 'DSDigital';
            font-size: 20vw;
            color: #ff2020;
            letter-spacing: 2vw;
            text-align: center;
            text-shadow: 0 0 40px #ff0000, 0 0 6px #d20000;
            user-select: none;
            margin-bottom: 1vh;
        }
        .clock .dots {
            transition: opacity 0.2s;
        }
        .control-dot {
            position: fixed;
            top: 2vw;
            right: 2vw;
            width: 3vw;
            height: 3vw;
            min-width: 22px;
            min-height: 22px;
            background: #ff8800;
            border-radius: 50%;
            border: 2px solid #fff400;
            box-shadow: 0 0 14px #ff8800ab;
            z-index: 10;
            cursor: pointer;
        }
        .control-dot.recording {
            animation: blink-dot 0.7s linear infinite;
            background: #ff0000 !important;
        }
        @keyframes blink-dot {
            0%, 49% { opacity: 1; }
            50%,99% { opacity: 0.3; }
        }
        .status-message {
            position: fixed;
            bottom: 2vw;
            right: 2vw;
            background: #ff8800;
            color: #222;
            font-size: 1.5vw;
            padding: 0.5vw 1vw;
            border-radius: 1vw;
            font-weight: bold;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s;
        }
        .status-message.show { opacity: 1; }
        video { display: none; }
        .recording-time {
            position: fixed;
            top: 2vw;
            left: 2vw;
            color: #ff8800;
            font-size: 2vw;
            font-family: Arial, sans-serif;
            font-weight: bold;
            background: rgba(0,0,0,0.03);
            z-index: 6;
            display: none;
        }
        .recording-time.show { display: block; }
        @media (max-width: 700px) {
            .clock { font-size: 14vh; }
            .recording-time, .status-message { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock">
            <span id="h1">8</span><span id="h2">8</span><span class="dots" id="dots">:</span><span id="m1">8</span><span id="m2">8</span>
        </div>
        <div class="control-dot" id="controlDot" title="Kayıt başlat/durdur"></div>
        <div class="recording-time" id="recordingTime"></div>
        <div class="status-message" id="statusMessage"></div>
        <video id="cameraVideo" autoplay playsinline></video>
    </div>
    <script>
        // Saat ve animasyon
        function pad(x) { return x.toString().padStart(2, "0"); }
        const h1 = document.getElementById("h1");
        const h2 = document.getElementById("h2");
        const m1 = document.getElementById("m1");
        const m2 = document.getElementById("m2");
        const dots = document.getElementById("dots");
        let dotState = true;
        setInterval(() => {
            const d = new Date();
            const h = pad(d.getHours());
            const m = pad(d.getMinutes());
            h1.textContent = h[0];
            h2.textContent = h[1];
            m1.textContent = m[0];
            m2.textContent = m[1];
            dotState = !dotState;
            dots.style.opacity = dotState ? "1" : "0.2";
        }, 1000);
        // Tam ekrana geçiş
        let tapCount = 0;
        let tapTimer = null;
        document.querySelector(".clock").addEventListener("click", () => {
            tapCount++;
            if (tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2200);
            if (tapCount >= 5) {
                tapCount = 0;
                const el = document.documentElement;
                if (!document.fullscreenElement) el.requestFullscreen();
            }
        });
        // Kayıt fonksiyonları
        const controlDot = document.getElementById('controlDot');
        const statusMessage = document.getElementById('statusMessage');
        const recordingTime = document.getElementById('recordingTime');
        const cameraVideo = document.getElementById('cameraVideo');
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordingStartTime = null;
        let recordingTimerInterval = null;
        let stream = null;
        function showStatus(msg, time=2000) {
            statusMessage.textContent = msg;
            statusMessage.classList.add('show');
            setTimeout(() => statusMessage.classList.remove('show'), time);
        }
        function updateRecordingTime() {
            if (!recordingStartTime) return;
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const min = pad(Math.floor(elapsed / 60));
            const sec = pad(elapsed % 60);
            recordingTime.textContent;
        }
        async function getCameraStream() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: {ideal:1280}, height:{ideal:720} },
                    audio: true
                });
                cameraVideo.srcObject = stream;
                return stream;
            } catch (e) {
                showStatus("❌ Kamera/ses izni verilmedi!");
                return null;
            }
        }
        window.addEventListener('load', async () => { await getCameraStream(); });
        window.addEventListener('beforeunload', () => {
            if (cameraVideo.srcObject) cameraVideo.srcObject.getTracks().forEach(t=> t.stop());
        });
        controlDot.addEventListener("click", async () => {
            if (!isRecording) await startRecording();
            else await stopRecordingAndDownload();
        });
        async function startRecording() {
            try {
                if (!stream) stream = await getCameraStream();
                if (!stream) return;
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm;codecs=vp8,opus" });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {};
                mediaRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                controlDot.classList.add("recording");
                recordingTime.classList.add("show");
                recordingTimerInterval = setInterval(updateRecordingTime, 1000);
                showStatus("🔴 Kayıt başladı!");
            } catch (e) { showStatus("❌ Kayıt başlatılamadı!"); }
        }
        async function stopRecordingAndDownload() {
            try {
                if (!mediaRecorder || !isRecording) return;
                mediaRecorder.stop();
                isRecording = false;
                controlDot.classList.remove("recording");
                recordingTime.classList.remove("show");
                clearInterval(recordingTimerInterval);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, {type: 'video/webm'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    const now = new Date();
                    const timestamp = now.toISOString().replace(/[:.]/g, '-').slice(0,-5);
                    a.href = url; a.download = `sinav-kayit-${timestamp}.webm`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    showStatus("✅ Kayıt indirildi!", 3000);
                    if (cameraVideo.srcObject) cameraVideo.srcObject.getTracks().forEach(track => track.stop());
                    stream = null;
                };
            } catch (e) { showStatus("❌ Kayıt durdurulamadı!"); }
        }
    </script>
</body>
</html>
