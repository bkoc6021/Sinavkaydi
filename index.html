<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Cumhuriyeti Burak Koç sınav hizmetleri kayıtlı sınav saati</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    touch-action:manipulation;
}

video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

.clock-box{
    position:relative;
    background:black;
    padding:20px 30px;
    z-index:2;
}

.clock{
    display:flex;
    align-items:center;
}

.digit{
    position:relative;
    width:60px;
    height:110px;
    margin:5px;
}

.segment{
    position:absolute;
    background:red;
    opacity:0.1;
}

.on{ opacity:1; }

.a{ top:0; left:10%; width:80%; height:10%; }
.b{ top:5%; right:0; width:10%; height:40%; }
.c{ bottom:5%; right:0; width:10%; height:40%; }
.d{ bottom:0; left:10%; width:80%; height:10%; }
.e{ bottom:5%; left:0; width:10%; height:40%; }
.f{ top:5%; left:0; width:10%; height:40%; }
.g{ top:45%; left:10%; width:80%; height:10%; }

.colon{
    width:20px;
    height:110px;
    position:relative;
}

.dot{
    width:15px;
    height:15px;
    background:red;
    border-radius:50%;
    position:absolute;
    left:0;
    right:0;
    margin:auto;
}

.dot.top{ top:25%; }
.dot.bottom{ bottom:25%; }

.rec-dot{
    position:fixed;
    top:20px;
    right:20px;
    width:15px;
    height:15px;
    background:red;
    border-radius:50%;
    display:none;
    z-index:3;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<div class="rec-dot" id="recDot"></div>

<div class="clock-box">
    <div class="clock" id="clock"></div>
</div>

<script>
let mediaRecorder;
let recordedChunks=[];
let stream;
let wakeLock=null;
let recording=false;
let lastTap=0;

const numbers={
0:['a','b','c','d','e','f'],
1:['b','c'],
2:['a','b','g','e','d'],
3:['a','b','g','c','d'],
4:['f','g','b','c'],
5:['a','f','g','c','d'],
6:['a','f','g','e','c','d'],
7:['a','b','c'],
8:['a','b','c','d','e','f','g'],
9:['a','b','c','d','f','g']
};

function createDigit(){
    const d=document.createElement("div");
    d.className="digit";
    ['a','b','c','d','e','f','g'].forEach(s=>{
        const seg=document.createElement("div");
        seg.className="segment "+s;
        d.appendChild(seg);
    });
    return d;
}

function createColon(){
    const c=document.createElement("div");
    c.className="colon";
    const t=document.createElement("div");
    t.className="dot top";
    const b=document.createElement("div");
    b.className="dot bottom";
    c.appendChild(t);
    c.appendChild(b);
    return c;
}

const clock=document.getElementById("clock");
const d1=createDigit();
const d2=createDigit();
const colon=createColon();
const d3=createDigit();
const d4=createDigit();
clock.append(d1,d2,colon,d3,d4);

function setDigit(digit,num){
    digit.querySelectorAll(".segment").forEach(s=>s.classList.remove("on"));
    numbers[num].forEach(n=>{
        digit.querySelector("."+n).classList.add("on");
    });
}

function updateClock(){
    const now=new Date();
    let h=now.getHours().toString().padStart(2,'0');
    let m=now.getMinutes().toString().padStart(2,'0');
    setDigit(d1,h[0]);
    setDigit(d2,h[1]);
    setDigit(d3,m[0]);
    setDigit(d4,m[1]);
    colon.style.visibility=
        colon.style.visibility==="hidden"?"visible":"hidden";
}
setInterval(updateClock,1000);
updateClock();

async function initCamera(){
    stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    video.srcObject=stream;
    mediaRecorder=new MediaRecorder(stream);

    mediaRecorder.ondataavailable=e=>{
        if(e.data.size>0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop=()=>{
        const blob=new Blob(recordedChunks,{type:"video/webm"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url;
        a.download="kayit.webm";
        a.click();
        recordedChunks=[];
    };
}
initCamera();

async function requestWakeLock(){
    if("wakeLock" in navigator){
        wakeLock=await navigator.wakeLock.request("screen");
    }
}

function toggleRecording(){
    if(!recording){
        mediaRecorder.start();
        requestWakeLock();
        document.getElementById("recDot").style.display="block";
        recording=true;
    }else{
        mediaRecorder.stop();
        if(wakeLock) wakeLock.release();
        document.getElementById("recDot").style.display="none";
        recording=false;
    }
}

document.body.addEventListener("click",e=>{
    const now=Date.now();
    if(now-lastTap<300){
        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen();
        }
    }else{
        toggleRecording();
    }
    lastTap=now;
});
</script>

</body>
</html>
